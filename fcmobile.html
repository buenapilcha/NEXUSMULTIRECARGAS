<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus System | FC Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: rgba(20, 20, 22, 0.6);
            --card-solid: #121214;
            --accent: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.15);
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-dim: #8b8b93;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text-main); font-family: 'Outfit', sans-serif; overflow: hidden; }

        header { 
            padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(20px); 
            z-index: 1000; border-bottom: 1px solid var(--border); position: sticky; top: 0;
        }

        .back-btn { 
            width: 42px; height: 42px; background: var(--card-solid); border: 1px solid var(--border); 
            border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s;
        }

        .brand-name { font-weight: 900; font-size: 1.2rem; letter-spacing: -1px; }

        #content-area { height: calc(100vh - 75px - 85px); overflow-y: auto; padding: 0 24px 150px 24px; scrollbar-width: none; }
        #content-area::-webkit-scrollbar { display: none; }

        .hero-section { padding: 40px 0 30px 0; text-align: center; }
        .hero-icon-box {
            width: 85px; height: 85px; margin: 0 auto 15px; background: var(--card-solid);
            border-radius: 22px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6); overflow: hidden; border: 1px solid var(--border-hover);
        }
        .hero-icon-box img { width: 100%; height: 100%; object-fit: cover; }

        .section-title { font-size: 0.75rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }

        .id-field {
            background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 18px 24px;
            display: flex; align-items: center; gap: 15px; backdrop-filter: blur(10px); transition: 0.3s;
        }
        .id-field input { background: none; border: none; color: white; font-size: 1.1rem; font-weight: 600; width: 100%; outline: none; }

        .packs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }

        .pack-item {
            background: linear-gradient(145deg, var(--card) 0%, rgba(20, 20, 22, 0.2) 100%);
            border: 1px solid var(--border); border-radius: 22px; padding: 24px 15px; text-align: center; 
            transition: all 0.4s; cursor: pointer; backdrop-filter: blur(10px);
        }
        
        .fc-icon { 
            width: 48px; margin-bottom: 12px; 
            mix-blend-mode: screen; 
            filter: brightness(1.2) contrast(1.1); 
        }

        .pack-item.selected {
            border-color: var(--accent); background: linear-gradient(145deg, rgba(0, 255, 136, 0.05) 0%, rgba(0, 255, 136, 0.01) 100%);
        }

        .pack-item strong { display: block; font-size: 1.25rem; font-weight: 900; margin: 8px 0; color: #f4f4f5; }
        .pack-item .price {
            display: inline-block; font-size: 0.85rem; font-weight: 700; color: var(--text-dim);
            background: rgba(255,255,255,0.04); padding: 6px 14px; border-radius: 10px;
        }

        .action-wrapper { position: fixed; bottom: 85px; left: 0; right: 0; padding: 20px 24px; background: linear-gradient(to top, var(--bg) 80%, transparent); z-index: 900; }
        .btn-pay {
            width: 100%; padding: 20px; border-radius: 20px; border: none; background: var(--card-solid); color: #555; 
            font-size: 1.05rem; font-weight: 800; text-transform: uppercase; cursor: not-allowed; transition: 0.3s;
        }
        .btn-pay.active { background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%); color: #000; cursor: pointer; }

        .tab-bar { 
            position: fixed; bottom: 0; width: 100%; height: calc(70px + env(safe-area-inset-bottom)); 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.07); 
            display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; 
        }
        .tab-item { color: #444; text-align: center; cursor: pointer; }
        .tab-item.active { color: var(--accent); }
        .tab-item span { display: block; font-size: 0.6rem; text-transform: uppercase; margin-top: 4px; font-weight: 700; }
        
        .error-shake { animation: shake 0.3s ease-in-out; border-color: #ff4655 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

    <header>
        <div class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-chevron-left"></i></div>
        <div class="brand-name">NEXUS<span style="color:var(--accent)">SYSTEM</span></div>
        <div style="width: 42px;"></div>
    </header>

    <div id="content-area">
        <section class="hero-section">
            <div class="hero-icon-box">
                <img src="https://sm.ign.com/ign_br/cover/e/ea-sports-/ea-sports-fc-mobile_c2as.jpg" alt="FC Mobile Logo">
            </div>
            <h1>FC Mobile</h1>
        </section>

        <div class="input-group">
            <div class="section-title">01. ID del Jugador</div>
            <div class="id-field" id="id-container">
                <i class="fas fa-id-card"></i>
                <input type="text" id="id-input" placeholder="Tu UID de FC Mobile" oninput="validate()">
            </div>
            <p id="hint" style="font-size: 0.7rem; color: #444; margin: 10px 0 0 5px;">Búscalo en la configuración del juego</p>
        </div>

        <div class="input-group">
            <div class="section-title">02. Seleccionar Pack</div>
            <div class="packs-grid">
                <div class="pack-item" onclick="select(this, '500 FC Points', '$7.500', 'LINK_MP_1')">
                    <img src="https://pbs.twimg.com/media/F07sn5UWYBQZ4jB.png" class="fc-icon">
                    <strong>500 Pts</strong>
                    <div class="price">$7.500</div>
                </div>
                <div class="pack-item" onclick="select(this, '1050 FC Points', '$14.000', 'LINK_MP_2')">
                    <img src="https://pbs.twimg.com/media/F07sn5UWYBQZ4jB.png" class="fc-icon">
                    <strong>1050 Pts</strong>
                    <div class="price">$14.000</div>
                </div>
                <div class="pack-item" onclick="select(this, '2200 FC Points', '$28.000', 'LINK_MP_3')">
                    <img src="https://pbs.twimg.com/media/F07sn5UWYBQZ4jB.png" class="fc-icon">
                    <strong>2200 Pts</strong>
                    <div class="price">$28.000</div>
                </div>
                <div class="pack-item" onclick="select(this, '5750 FC Points', '$65.000', 'LINK_MP_4')">
                    <img src="https://pbs.twimg.com/media/F07sn5UWYBQZ4jB.png" class="fc-icon">
                    <strong>5750 Pts</strong>
                    <div class="price">$65.000</div>
                </div>
            </div>
        </div>
    </div>

    <div class="action-wrapper">
        <button class="btn-pay" id="main-btn" onclick="process()">Continuar</button>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="window.location.href='index.html?tab=home'"><i class="fas fa-home"></i><span>Inicio</span></div>
        <div class="tab-item" onclick="window.location.href='index.html?tab=history'"><i class="fas fa-history"></i><span>Pedidos</span></div>
        <div class="tab-item" onclick="window.location.href='index.html?tab=support'"><i class="fas fa-headset"></i><span>Soporte</span></div>
        <div class="tab-item" onclick="window.location.href='index.html?tab=profile'"><i class="fas fa-user"></i><span>Perfil</span></div>
    </div>

    <script>
        let pack = null;

        function select(el, info, price, mpLink) {
            document.querySelectorAll('.pack-item').forEach(p => p.classList.remove('selected'));
            el.classList.add('selected');
            pack = { info, price, mpLink };
            validate();
        }

        function validate() {
            const id = document.getElementById('id-input').value;
            const btn = document.getElementById('main-btn');
            const hint = document.getElementById('hint');
            
            // Validación: Solo números y longitud mayor a 6
            const isNumeric = /^\d+$/.test(id);
            const isValid = id.length >= 6 && isNumeric;

            if(id.length > 0) {
                hint.style.color = isValid ? "var(--accent)" : "#ff4655";
                hint.innerText = isValid ? "✓ UID válido" : "⚠ Solo números, min 6 dígitos";
            } else {
                hint.style.color = "#444";
                hint.innerText = "Búscalo en la configuración del juego";
            }

            if(isValid && pack) {
                btn.classList.add('active');
                btn.innerText = "Pagar " + pack.price;
            } else {
                btn.classList.remove('active');
                btn.innerText = "Continuar";
            }
        }

        function process() {
            const btn = document.getElementById('main-btn');
            const idContainer = document.getElementById('id-container');

            if(!btn.classList.contains('active')) {
                idContainer.classList.add('error-shake');
                setTimeout(() => idContainer.classList.remove('error-shake'), 300);
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            const order = { game: 'FC Mobile', id: document.getElementById('id-input').value, pack: pack.info, price: pack.price, mpLink: pack.mpLink, date: new Date().toLocaleDateString(), status: 'Pendiente', orderId: '#' + Math.floor(Math.random()*900000 + 100000) };
            localStorage.setItem('current_checkout', JSON.stringify(order));
            let history = JSON.parse(localStorage.getItem('nexus_orders')) || [];
            history.unshift(order);
            localStorage.setItem('nexus_orders', JSON.stringify(history));
            setTimeout(() => { window.location.href = 'pago.html'; }, 800);
        }
    </script>
</body>
</html>
