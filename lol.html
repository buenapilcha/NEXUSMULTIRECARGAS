<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus System | League of Legends</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: rgba(20, 20, 22, 0.6);
            --card-solid: #121214;
            --accent: #00cfff; /* Azul Cyan Riot */
            --accent-glow: rgba(0, 207, 255, 0.15);
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-dim: #8b8b93;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Outfit', sans-serif; 
            overflow: hidden; 
        }

        header { 
            padding: 18px 24px; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 1000; border-bottom: 1px solid var(--border);
            position: sticky; top: 0;
        }

        .back-btn { 
            width: 42px; height: 42px; background: var(--card-solid); 
            border: 1px solid var(--border); border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: all 0.3s ease;
        }
        .back-btn:active { transform: scale(0.92); }

        .brand-name { font-weight: 900; font-size: 1.2rem; letter-spacing: -1px; }

        #content-area { 
            height: calc(100vh - 75px - 85px); 
            overflow-y: auto; padding: 0 24px 150px 24px; 
        }
        #content-area::-webkit-scrollbar { display: none; }

        .hero-section { padding: 40px 0 30px 0; text-align: center; }
        
        /* Logo LoL Premium (Sin brillo azul, más minimalista) */
        .hero-icon-box {
            width: 85px; height: 85px; margin: 0 auto 15px;
            background: var(--card-solid);
            border-radius: 22px; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            border: 1px solid var(--border-hover);
        }
        .hero-icon-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-section h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
        .hero-section p { color: var(--text-dim); font-size: 0.95rem; font-weight: 400; }

        .input-group { margin-bottom: 35px; }
        .section-title { 
            font-size: 0.75rem; font-weight: 800; color: var(--accent); 
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px;
        }

        /* Input ID Premium */
        .id-field {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 18px; padding: 18px 24px;
            display: flex; align-items: center; gap: 15px; transition: all 0.3s ease;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .id-field:focus-within { 
            border-color: rgba(0, 207, 255, 0.4); 
            background: rgba(255, 255, 255, 0.03); 
            box-shadow: 0 0 0 4px var(--accent-glow);
        }
        .id-field i { color: var(--text-dim); font-size: 1.2rem; transition: 0.3s; }
        .id-field:focus-within i { color: var(--accent); }
        .id-field input { 
            background: none; border: none; color: white; 
            font-size: 1.1rem; font-weight: 600; width: 100%; outline: none;
        }
        .id-field input::placeholder { color: #555; font-weight: 400; }

        .packs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }

        /* Tarjetas de RP Premium */
        .pack-item {
            background: linear-gradient(145deg, var(--card) 0%, rgba(20, 20, 22, 0.2) 100%);
            border: 1px solid var(--border);
            border-radius: 22px; padding: 24px 15px; 
            text-align: center; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden; cursor: pointer;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        /* Efecto de luz superior tenue en las tarjetas */
        .pack-item::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }
        
        .pack-item.selected {
            border-color: var(--accent); 
            background: linear-gradient(145deg, rgba(0, 207, 255, 0.05) 0%, rgba(0, 207, 255, 0.01) 100%);
            transform: translateY(-4px); 
            box-shadow: 0 12px 30px rgba(0,0,0,0.5), 0 0 20px var(--accent-glow);
        }
        
        /* Imagen del RP */
        .rp-icon { 
            width: 44px; margin-bottom: 12px; 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4)); 
            transition: all 0.3s ease;
        }
        .pack-item.selected .rp-icon {
            filter: drop-shadow(0 0 12px rgba(0, 207, 255, 0.4));
            transform: scale(1.05);
        }

        .pack-item strong { display: block; font-size: 1.25rem; font-weight: 900; margin: 8px 0; color: #f4f4f5; }
        .pack-item .price {
            display: inline-block; font-size: 0.85rem; font-weight: 700; color: var(--text-dim);
            background: rgba(255,255,255,0.04); padding: 6px 14px; border-radius: 10px;
            transition: 0.3s; border: 1px solid transparent;
        }
        .pack-item.selected strong { color: var(--accent); }
        .pack-item.selected .price { 
            background: var(--text-main); color: var(--bg); 
            border-color: var(--text-main); box-shadow: 0 4px 10px rgba(255,255,255,0.2);
        }

        /* Área del botón */
        .action-wrapper {
            position: fixed; bottom: 85px; left: 0; right: 0;
            padding: 20px 24px; background: linear-gradient(to top, var(--bg) 80%, transparent); z-index: 900;
        }
        .btn-pay {
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            background: var(--card-solid); color: #555; font-size: 1.05rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1.5px; transition: all 0.3s ease;
            border: 1px solid var(--border); cursor: not-allowed;
        }
        .btn-pay.active { 
            background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%); 
            color: #000; border-color: #fff;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.15); 
            cursor: pointer;
        }
        .btn-pay.active:active { transform: scale(0.98); }

        /* --- TAB BAR IDÉNTICA AL INDEX --- */
        .tab-bar { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            height: calc(70px + env(safe-area-inset-bottom)); 
            background: rgba(5,5,5,0.9); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            padding-bottom: env(safe-area-inset-bottom); 
            z-index: 1000; 
        }
        .tab-item { color: #444; text-align: center; cursor: pointer; transition: 0.3s; }
        .tab-item.active { color: var(--accent); }
        .tab-item span { 
            display: block; font-size: 0.65rem; text-transform: uppercase; 
            margin-top: 4px; font-weight: 700; letter-spacing: 0.5px;
        }

    </style>
</head>
<body>

    <header>
        <div class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-chevron-left"></i></div>
        <div class="brand-name">NEXUS<span style="color:var(--accent)">SYSTEM</span></div>
        <div style="width: 42px;"></div>
    </header>

    <div id="content-area">
        <section class="hero-section">
            <div class="hero-icon-box">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgXVjjZyKKJz05VBJPnGFXdpUxrUvJjmb9NWMbkmHQdFSG13Mz-7pJPkQ&s=10" alt="LoL Logo">
            </div>
            <h1>League of Legends</h1>
            <p>Recargas de Riot Points Instantáneas</p>
        </section>

        <div class="input-group">
            <div class="section-title">01. Identificación</div>
            <div class="id-field">
                <i class="fas fa-user-tag"></i>
                <input type="text" id="id-input" placeholder="Riot ID (Ej: Nexus#LAN)" oninput="validate()" autocomplete="off">
            </div>
        </div>

        <div class="input-group">
            <div class="section-title">02. Seleccionar RP</div>
            <div class="packs-grid">
                
                <div class="pack-item" onclick="select(this, '1050 RP', '$12.500', 'L_MP_1')">
                    <img src="https://wiki.leagueoflegends.com/en-us/images/RP_icon.png?1fb01" class="rp-icon">
                    <strong>1050 RP</strong>
                    <div class="price">$12.500</div>
                </div>

                <div class="pack-item" onclick="select(this, '2100 RP', '$24.000', 'L_MP_2')">
                    <img src="https://wiki.leagueoflegends.com/en-us/images/RP_icon.png?1fb01" class="rp-icon">
                    <strong>2100 RP</strong>
                    <div class="price">$24.000</div>
                </div>

                <div class="pack-item" onclick="select(this, '3450 RP', '$38.000', 'L_MP_3')">
                    <img src="https://wiki.leagueoflegends.com/en-us/images/RP_icon.png?1fb01" class="rp-icon">
                    <strong>3450 RP</strong>
                    <div class="price">$38.000</div>
                </div>

                <div class="pack-item" onclick="select(this, '5750 RP', '$62.000', 'L_MP_4')">
                    <img src="https://wiki.leagueoflegends.com/en-us/images/RP_icon.png?1fb01" class="rp-icon">
                    <strong>5750 RP</strong>
                    <div class="price">$62.000</div>
                </div>

            </div>
        </div>
    </div>

    <div class="action-wrapper">
        <button class="btn-pay" id="main-btn" onclick="process()">Continuar</button>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="window.location.href='index.html?tab=home'">
            <i class="fas fa-home"></i><span>Inicio</span>
        </div>
        <div class="tab-item" onclick="window.location.href='index.html?tab=history'">
            <i class="fas fa-history"></i><span>Pedidos</span>
        </div>
        <div class="tab-item" onclick="window.location.href='index.html?tab=support'">
            <i class="fas fa-headset"></i><span>Soporte</span>
        </div>
        <div class="tab-item" onclick="window.location.href='index.html?tab=profile'">
            <i class="fas fa-user"></i><span>Perfil</span>
        </div>
    </div>

    <script>
        let pack = null;

        function select(el, info, price, mpLink) {
            document.querySelectorAll('.pack-item').forEach(p => p.classList.remove('selected'));
            el.classList.add('selected');
            pack = { info, price, mpLink };
            validate();
        }

        function validate() {
            const id = document.getElementById('id-input').value;
            const btn = document.getElementById('main-btn');
            if(id.length > 3 && pack) {
                btn.classList.add('active');
                btn.innerText = "Pagar " + pack.price;
            } else {
                btn.classList.remove('active');
                btn.innerText = "Continuar";
            }
        }

        function process() {
            if(!document.getElementById('main-btn').classList.contains('active')) return;
            
            const order = {
                game: 'League of Legends',
                id: document.getElementById('id-input').value,
                pack: pack.info,
                price: pack.price,
                mpLink: pack.mpLink,
                date: new Date().toLocaleDateString(),
                status: 'Pendiente',
                orderId: '#' + Math.floor(Math.random()*900000 + 100000)
            };

            localStorage.setItem('current_checkout', JSON.stringify(order));
            let history = JSON.parse(localStorage.getItem('nexus_orders')) || [];
            history.unshift(order);
            localStorage.setItem('nexus_orders', JSON.stringify(history));

            setTimeout(() => { window.location.href = 'pago.html'; }, 300); // Reducido un poco para sentirse más rápido
        }
    </script>
</body>
</html>
