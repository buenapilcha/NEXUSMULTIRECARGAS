<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus System | Valorant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #060606;
            --card: #121214;
            --accent: #ff4655; /* Rojo Valorant */
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Outfit', sans-serif; 
            overflow: hidden; 
        }

        header { 
            padding: 18px 24px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(6, 6, 6, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000; 
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0;
        }

        .back-btn { 
            width: 42px; height: 42px; 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s;
        }
        .back-btn:active { transform: scale(0.9); }

        .brand-name { font-weight: 900; font-size: 1.2rem; letter-spacing: -1px; }

        #content-area { 
            height: calc(100vh - 75px - 85px); 
            overflow-y: auto; 
            padding: 0 24px 150px 24px; 
            scrollbar-width: none;
        }
        #content-area::-webkit-scrollbar { display: none; }

        .hero-section {
            padding: 40px 0 30px 0;
            text-align: center;
        }
        .hero-icon-box {
            width: 85px; height: 85px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, var(--accent), #b32d38);
            border-radius: 26px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 35px rgba(255, 70, 85, 0.3);
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .hero-icon-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .hero-section h1 { font-size: 2rem; font-weight: 900; }
        .hero-section p { color: var(--text-dim); font-size: 0.9rem; margin-top: 4px; }

        .input-group { margin-bottom: 35px; }
        .section-title { 
            font-size: 0.75rem; font-weight: 800; color: var(--accent); 
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px;
        }

        .id-field {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 18px 24px;
            display: flex; align-items: center; gap: 15px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .id-field:focus-within { border-color: var(--accent); background: #161618; }
        .id-field i { color: #444; font-size: 1.2rem; }
        .id-field input { 
            background: none; border: none; color: white; 
            font-size: 1.1rem; font-weight: 600; width: 100%; outline: none;
        }

        .packs-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
        }

        .pack-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 22px 15px;
            text-align: center;
            position: relative;
            transition: 0.3s all ease;
        }
        .pack-item.selected {
            border-color: var(--accent);
            background: rgba(255, 70, 85, 0.03);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .pack-item strong { display: block; font-size: 1.3rem; font-weight: 900; margin: 8px 0; color: #eee; }
        .pack-item .price {
            display: inline-block;
            font-size: 0.85rem; font-weight: 700; color: var(--text-dim);
            background: rgba(255,255,255,0.05);
            padding: 6px 12px; border-radius: 12px;
        }
        .pack-item.selected strong { color: var(--accent); }
        .pack-item.selected .price { background: white; color: black; }

        .action-wrapper {
            position: fixed; bottom: 85px; left: 0; right: 0;
            padding: 20px 24px;
            background: linear-gradient(to top, var(--bg) 70%, transparent);
            z-index: 900;
        }
        .btn-pay {
            width: 100%; padding: 20px; border-radius: 22px; border: none;
            background: #222; color: #555; font-size: 1rem; font-weight: 900;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-pay.active {
            background: white; color: black;
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        /* --- TAB BAR IDÉNTICA AL INDEX --- */
        .tab-bar { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            height: calc(70px + env(safe-area-inset-bottom)); 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(20px); 
            border-top: 1px solid rgba(255,255,255,0.07); 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            padding-bottom: env(safe-area-inset-bottom); 
            z-index: 1000; 
        }
        .tab-item { 
            color: #444; 
            text-align: center; 
            cursor: pointer; 
        }
        .tab-item.active { 
            color: var(--accent); /* Se mantiene el color acento original de este archivo */
        }
        .tab-item span { 
            display: block; 
            font-size: 0.6rem; 
            text-transform: uppercase; 
            margin-top: 4px; 
            font-weight: 700; 
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .error-shake { animation: shake 0.3s ease-in-out; border-color: var(--accent) !important; }

    </style>
</head>
<body>

    <header>
        <div class="back-btn" onclick="window.location.href='index.html'">
            <i class="fas fa-chevron-left"></i>
        </div>
        <div class="brand-name">NEXUS<span style="color:var(--accent)">SYSTEM</span></div>
        <div style="width: 42px;"></div>
    </header>

    <div id="content-area">
        <section class="hero-section">
            <div class="hero-icon-box">
                <img src="https://images.seeklogo.com/logo-png/37/1/valorant-logo-png_seeklogo-379976.png" alt="Valorant Logo">
            </div>
            <h1>Valorant</h1>
            <p>Recarga de Valorant Points (Riot ID)</p>
        </section>

        <div class="input-group">
            <div class="section-title">01. Riot ID</div>
            <div class="id-field" id="id-container">
                <i class="fas fa-hashtag"></i>
                <input type="text" id="id-input" placeholder="Ej: Usuario #LAS" oninput="validate()">
            </div>
            <p id="hint" style="font-size: 0.7rem; color: #444; margin: 10px 0 0 5px;">Incluye el nombre y el hashtag</p>
        </div>

        <div class="input-group">
            <div class="section-title">02. Seleccionar VP</div>
            <div class="packs-grid">
                <div class="pack-item" onclick="select(this, '500 VP', '$4.500', 'LINK_MP_1')">
                    <strong>500 💎</strong>
                    <div class="price">$4.500</div>
                </div>
                <div class="pack-item" onclick="select(this, '1050 VP', '$8.900', 'LINK_MP_2')">
                    <strong>1050 💎</strong>
                    <div class="price">$8.900</div>
                </div>
                <div class="pack-item" onclick="select(this, '2175 VP', '$17.500', 'LINK_MP_3')">
                    <strong>2175 💎</strong>
                    <div class="price">$17.500</div>
                </div>
                <div class="pack-item" onclick="select(this, '4850 VP', '$36.000', 'LINK_MP_4')">
                    <strong>4850 💎</strong>
                    <div class="price">$36.000</div>
                </div>
            </div>
        </div>
    </div>

    <div class="action-wrapper">
        <button class="btn-pay" id="main-btn" onclick="process()">Continuar</button>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="window.location.href='index.html?tab=home'">
            <i class="fas fa-home"></i><span>Inicio</span>
        </div>
        <div class="tab-item" onclick="window.location.href='index.html?tab=history'">
            <i class="fas fa-history"></i><span>Pedidos</span>
        </div>
        <div class="tab-item" onclick="window.location.href='index.html?tab=support'">
            <i class="fas fa-headset"></i><span>Soporte</span>
        </div>
        <div class="tab-item" onclick="window.location.href='index.html?tab=profile'">
            <i class="fas fa-user"></i><span>Perfil</span>
        </div>
    </div>

    <script>
        let pack = null;

        function select(el, info, price, mpLink) {
            document.querySelectorAll('.pack-item').forEach(p => p.classList.remove('selected'));
            el.classList.add('selected');
            pack = { info, price, mpLink };
            validate();
        }

        function validate() {
            const id = document.getElementById('id-input').value;
            const btn = document.getElementById('main-btn');
            const hint = document.getElementById('hint');
            const isValid = id.includes('#') && id.length > 4;

            if(id.length > 0) {
                hint.style.color = isValid ? "var(--accent)" : "#ff4655";
                hint.innerText = isValid ? "✓ Riot ID Válido" : "⚠ Falta el # o es muy corto";
            }

            if(isValid && pack) {
                btn.classList.add('active');
                btn.innerText = "Pagar " + pack.price;
            } else {
                btn.classList.remove('active');
                btn.innerText = "Continuar";
            }
        }

        function process() {
            const btn = document.getElementById('main-btn');
            const idContainer = document.getElementById('id-container');

            if(!btn.classList.contains('active')) {
                idContainer.classList.add('error-shake');
                setTimeout(() => idContainer.classList.remove('error-shake'), 300);
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            const order = {
                game: 'Valorant',
                id: document.getElementById('id-input').value,
                pack: pack.info,
                price: pack.price,
                mpLink: pack.mpLink,
                date: new Date().toLocaleDateString(),
                status: 'Pendiente',
                orderId: '#' + Math.floor(Math.random()*900000 + 100000)
            };

            localStorage.setItem('current_checkout', JSON.stringify(order));
            let history = JSON.parse(localStorage.getItem('nexus_orders')) || [];
            history.unshift(order);
            localStorage.setItem('nexus_orders', JSON.stringify(history));

            setTimeout(() => { window.location.href = 'pago.html'; }, 800);
        }
    </script>
</body>
</html>
