<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nexus System | Official Partner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      /* Paleta unificada NEXUS */
      --nexus-accent: #d946ef; 
      --nexus-grad: linear-gradient(135deg, #8b5cf6 0%, #d946ef 50%, #f43f5e 100%);
      --nexus-grad-hover: linear-gradient(135deg, #7c3aed 0%, #c026d3 50%, #e11d48 100%);
      
      --bg-main: #09090b;
      --card-bg: #18181b;
      --card-bg-hover: #27272a;
      --border-soft: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(217, 70, 239, 0.4);
      
      --text-main: #f8fafc;
      --text-muted: #a1a1aa;
      --error: #ef4444;
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      line-height: 1.5;
      padding-top: 90px;
      padding-bottom: 100px;
      overflow-x: hidden;
    }

    /* HEADER */
    header { 
      padding: 16px 24px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      background: rgba(9, 9, 11, 0.85); 
      backdrop-filter: blur(20px); 
      -webkit-backdrop-filter: blur(20px);
      z-index: 1000; 
      border-bottom: 1px solid var(--border-soft);
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
    }

    .back-btn { 
      width: 42px; height: 42px; 
      background: var(--card-bg); 
      border: 1px solid var(--border-soft); 
      border-radius: 12px; 
      display: flex; align-items: center; justify-content: center; 
      cursor: pointer; transition: 0.2s ease;
      color: var(--text-main);
    }
    .back-btn:active { transform: scale(0.9); background: var(--card-bg-hover); }

    .brand-name { 
      font-weight: 900; 
      font-size: 1.3rem; 
      letter-spacing: -0.5px; 
      text-transform: uppercase; 
    }
    .brand-name span { 
      background: var(--nexus-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ESTILOS DEL BOTON DE MONEDA */
    .currency-toggle {
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      height: 42px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 800;
      transition: 0.2s ease;
      color: var(--text-main);
    }
    .currency-toggle i {
      color: var(--nexus-accent);
      font-size: 0.9rem;
    }
    .currency-toggle:active { transform: scale(0.9); background: var(--card-bg-hover); }

    .container { max-width: 500px; margin: 0 auto; padding: 20px; }

    /* HERO SECTION */
    .hero { text-align: center; margin-bottom: 30px; }
    .hero h1 { font-size: 1.9rem; font-weight: 900; margin-bottom: 8px; line-height: 1.1; letter-spacing: -0.5px; }
    .hero p { color: var(--text-muted); font-size: 0.95rem; font-weight: 400; }

    /* CAJA DE PRUEBA GRATIS */
    .free-trial-box {
      background: linear-gradient(145deg, rgba(24, 24, 27, 0.8), rgba(217, 70, 239, 0.05));
      border: 1px solid var(--border-focus);
      padding: 20px; 
      border-radius: 20px; 
      margin-top: 25px; 
      margin-bottom: 25px;
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      box-shadow: 0 10px 30px rgba(217, 70, 239, 0.05);
    }
    .free-trial-box h4 {
      background: var(--nexus-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 2px;
    }
    .free-trial-box p { font-size: 0.8rem; color: var(--text-muted); }
    .btn-trial {
      background: var(--nexus-grad); 
      color: #fff; 
      border: none; 
      padding: 12px 18px; 
      border-radius: 14px; 
      font-weight: 800; 
      font-size: 0.85rem;
      cursor: pointer; 
      transition: 0.2s;
      box-shadow: 0 4px 15px rgba(217, 70, 239, 0.3);
    }
    .btn-trial:active { transform: scale(0.95); }

    /* TABS DE PLATAFORMAS */
    .platform-tabs {
      display: flex; background: var(--card-bg); padding: 6px; border-radius: 16px; margin-bottom: 25px;
      border: 1px solid var(--border-soft);
    }
    .tab-btn-plat {
      flex: 1; padding: 12px; border: none; border-radius: 12px;
      background: transparent; color: var(--text-muted); font-weight: 700;
      font-size: 0.9rem; transition: 0.3s all ease; cursor: pointer;
    }
    .tab-btn-plat.active { 
      background: var(--card-bg-hover); 
      color: #fff; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
    }

    /* INPUTS */
    .input-field { margin-bottom: 24px; }
    .input-field label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    
    .input-wrapper {
        position: relative;
        background: var(--card-bg);
        border: 1.5px solid var(--border-soft);
        border-radius: 16px;
        display: flex;
        align-items: center;
        padding: 0 16px;
        transition: 0.3s;
    }
    .input-wrapper:focus-within { border-color: var(--nexus-accent); box-shadow: 0 0 15px rgba(217, 70, 239, 0.15); }
    .input-wrapper.valid-user { border-color: var(--nexus-accent) !important; box-shadow: 0 0 15px rgba(217, 70, 239, 0.2); }
    .input-wrapper.invalid-user { border-color: var(--error) !important; box-shadow: 0 0 12px rgba(239, 68, 68, 0.2); }

    .prefix { color: var(--nexus-accent); font-weight: 800; font-size: 1.1rem; margin-right: 5px; }
    
    input {
      width: 100%; padding: 18px 0; background: transparent; color: #fff;
      border: none; font-size: 1.05rem; font-weight: 600; outline: none;
    }
    input::placeholder { color: #52525b; font-weight: 500; }

    .mini-spinner {
        width: 18px; height: 18px;
        border: 2px solid rgba(255,255,255,0.1);
        border-top: 2px solid var(--nexus-accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        display: none;
        margin-left: 10px;
    }

    #userStatus { font-size: 0.8rem; margin-top: 10px; font-weight: 700; display: none; }

    /* LISTA DE PAQUETES */
    .package-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 25px; }
    .pkg-item {
      background: var(--card-bg); padding: 20px; border-radius: 20px;
      border: 1.5px solid var(--border-soft); display: flex;
      justify-content: space-between; align-items: center; transition: 0.3s all cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer; position: relative; overflow: hidden;
    }
    .pkg-item:active { transform: scale(0.98); }
    .pkg-item.selected { 
      border-color: var(--nexus-accent); 
      background: linear-gradient(90deg, rgba(217, 70, 239, 0.08) 0%, var(--card-bg) 100%);
      transform: translateX(4px);
      box-shadow: -5px 10px 25px rgba(0,0,0,0.3);
    }
    
    .pkg-name { font-weight: 700; font-size: 1rem; color: #fff; }
    .pkg-price { font-weight: 900; color: #fff; font-size: 1.05rem; background: rgba(255,255,255,0.05); padding: 8px 14px; border-radius: 12px; transition: 0.3s; }
    .pkg-item.selected .pkg-price { background: #fff; color: #000; }
    .price-old { text-decoration: line-through; color: var(--text-muted); font-size: 0.8rem; margin-right: 6px; font-weight: 500; }

    .promo-tag {
        position: absolute; top: 0; right: 20px;
        background: var(--nexus-grad); color: #fff; font-size: 0.65rem;
        font-weight: 900; padding: 4px 10px; border-radius: 0 0 8px 8px;
        box-shadow: 0 4px 10px rgba(217, 70, 239, 0.3);
        letter-spacing: 0.5px;
    }

    /* SECCIÓN CUPÓN */
    .promo-section { margin-bottom: 35px; }
    .promo-wrapper { display: flex; gap: 10px; }
    .promo-input { background: var(--card-bg); border: 1.5px solid var(--border-soft); border-radius: 16px; padding: 16px; color: #fff; font-weight: 600; flex: 1; font-size: 0.95rem; transition: 0.3s; }
    .promo-input:focus { border-color: rgba(255,255,255,0.3); }
    .promo-btn { background: var(--card-bg-hover); color: #fff; border: 1px solid var(--border-soft); padding: 0 24px; border-radius: 16px; font-weight: 800; font-size: 0.8rem; cursor: pointer; transition: 0.2s; }
    .promo-btn:active { transform: scale(0.95); background: #3f3f46; }

    /* BOTÓN PRINCIPAL */
    .btn-submit {
      width: 100%; padding: 20px; border-radius: 20px; border: none;
      background: var(--nexus-grad); color: #fff; font-size: 1.05rem; letter-spacing: 0.5px;
      font-weight: 900; cursor: pointer; box-shadow: 0 10px 25px rgba(217, 70, 239, 0.25);
      transition: 0.3s; text-transform: uppercase;
    }
    .btn-submit:active { transform: scale(0.98); box-shadow: 0 5px 15px rgba(217, 70, 239, 0.3); }

    /* PANTALLAS DE CARGA Y ALERTAS */
    #loading {
      position: fixed; inset: 0; background: rgba(9, 9, 11, 0.95); backdrop-filter: blur(5px);
      display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
    }
    .spinner { border: 4px solid rgba(255,255,255,0.05); border-top: 4px solid var(--nexus-accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #customAlert {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-200px);
      background: var(--card-bg); color: #fff; padding: 18px 30px; border-radius: 20px;
      border: 1px solid var(--border-focus); box-shadow: 0 20px 40px rgba(0,0,0,0.8);
      z-index: 5000; transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
      font-size: 0.9rem; font-weight: 700; text-align: center; min-width: 320px; backdrop-filter: blur(10px);
    }
    #customAlert.show { transform: translateX(-50%) translateY(90px); }

    /* --- TAB BAR IDÉNTICA AL INDEX --- */
    .tab-bar { 
        position: fixed; 
        bottom: 0; 
        width: 100%; 
        height: calc(70px + env(safe-area-inset-bottom)); 
        background: rgba(0,0,0,0.9); 
        backdrop-filter: blur(20px); 
        border-top: 1px solid rgba(255,255,255,0.07); 
        display: flex; 
        justify-content: space-around; 
        align-items: center; 
        padding-bottom: env(safe-area-inset-bottom); 
        z-index: 1000; 
    }
    .tab-item { 
        color: #444; 
        text-align: center; 
        cursor: pointer; 
    }
    .tab-item.active { 
        color: var(--nexus-accent); /* Color acento mantenido */
    }
    .tab-item span { 
        display: block; 
        font-size: 0.6rem; 
        text-transform: uppercase; 
        margin-top: 4px; 
        font-weight: 700; 
    }

  </style>
</head>
<body>

  <div id="customAlert"></div>

  <header>
    <div class="back-btn" onclick="window.location.href='index.html'">
      <i class="fas fa-chevron-left"></i>
    </div>
    <div class="brand-name">NEXUS<span>SYSTEM</span></div>
    <div class="currency-toggle" onclick="toggleCurrency()" id="currencyBtn" title="Cambiar Moneda">
      <span id="currText">MXN</span> <i class="fas fa-exchange-alt"></i>
    </div>
  </header>

  <div id="step1" class="container">
    <div class="hero">
      <h1>Crecimiento <br>Acelerado</h1>
      <p>Algoritmo de retención Premium para creadores.</p>
      
      <div class="free-trial-box">
        <div style="flex:1; text-align: left;">
          <h4>¿Primera vez?</h4>
          <p>Solicitá 10 seguidores sin cargo.</p>
        </div>
        <button class="btn-trial" onclick="enviarPruebaTg()">Probar Gratis</button>
      </div>
    </div>

    <div class="platform-tabs">
      <button class="tab-btn-plat active" id="tab-ig" onclick="switchPlatform('ig')">Instagram</button>
      <button class="tab-btn-plat" id="tab-tt" onclick="switchPlatform('tt')">TikTok</button>
    </div>

    <div class="input-field">
      <label>Usuario Oficial</label>
      <div class="input-wrapper" id="userBox">
          <span class="prefix">@</span>
          <input type="text" id="username" placeholder="nombredeusuario" autocomplete="off">
          <div class="mini-spinner" id="miniSpinner"></div>
      </div>
      <div id="userStatus"></div>
    </div>

    <div class="package-list" id="packItems"></div>

    <div class="promo-section">
      <div class="promo-wrapper">
        <input type="text" id="promoInput" class="promo-input" placeholder="¿Tenés un código de acceso?">
        <button class="promo-btn" onclick="aplicarCupon()">VALIDAR</button>
      </div>
    </div>

    <button class="btn-submit" onclick="verificarYPasar()">GESTIONAR PEDIDO SEGURO</button>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p id="lText" style="margin-top: 20px; font-size: 0.75rem; font-weight: 800; letter-spacing: 2px; color: #a1a1aa;">CONECTANDO AL SISTEMA...</p>
  </div>

  <!-- --- TAB BAR IDÉNTICA AL INDEX --- -->
  <div class="tab-bar">
      <div class="tab-item active" onclick="window.location.href='index.html?tab=home'">
          <i class="fas fa-home"></i><span>Inicio</span>
      </div>
      <div class="tab-item" onclick="window.location.href='index.html?tab=history'">
          <i class="fas fa-history"></i><span>Pedidos</span>
      </div>
      <div class="tab-item" onclick="window.location.href='index.html?tab=support'">
          <i class="fas fa-headset"></i><span>Soporte</span>
      </div>
      <div class="tab-item" onclick="window.location.href='index.html?tab=profile'">
          <i class="fas fa-user"></i><span>Perfil</span>
      </div>
  </div>

  <script>
    let currentPlat = 'ig';
    let currentCurrency = 'MXN'; // Moneda por defecto
    let selPack = { n: "", p: "", m: "", idx: 0 };
    let isUserOk = true;
    let typingTimer;
    let promoApplied = false;

    const botToken = "8562465983:AAG6Ure3ZmQ9Pke0MVNjD4512VfJT00nJ2w";
    const chatId = "6493944778";

    // Precios en ARS y MXN
    const pricesARS = [10000, 20000, 25000, 31000, 50000];
    const pricesMXN = [128.50, 257.00, 321.00, 398.00, 642.00];

    function toggleCurrency() {
        currentCurrency = currentCurrency === 'MXN' ? 'ARS' : 'MXN';
        document.getElementById('currText').innerText = currentCurrency;
        renderPacks();
        showAlert("Moneda cambiada a " + currentCurrency);
    }

    function switchPlatform(p) {
        currentPlat = p;
        document.querySelectorAll('.tab-btn-plat').forEach(b => b.classList.toggle('active', b.id === 'tab-'+p));
        resetUserStatus();
        if(p === 'tt') isUserOk = true;
        renderPacks();
    }

    function renderPacks() {
        const list = document.getElementById('packItems');
        const img = currentPlat === 'ig' 
          ? '<i class="fab fa-instagram" style="font-size: 24px; color: var(--nexus-accent);"></i>' 
          : '<i class="fab fa-tiktok" style="font-size: 24px; color: var(--text-main);"></i>';
          
        const names = currentPlat === 'ig' ? 
            ["5.000 Seguidores", "10.000 Seguidores", "20.000 Seguidores", "50.000 Seguidores", "100.000 Seguidores"] : 
            ["5.000 Fans TikTok", "10.000 Fans TikTok", "20.000 Fans TikTok", "50.000 Fans TikTok", "100.000 Fans TikTok"];
        
        list.innerHTML = names.map((name, index) => {
            let basePrice = currentCurrency === 'MXN' ? pricesMXN[index] : pricesARS[index];
            let finalPrice = basePrice;
            
            // Opciones de formato basadas en la moneda
            let formatOpts = currentCurrency === 'MXN' ? { minimumFractionDigits: 2, maximumFractionDigits: 2 } : { minimumFractionDigits: 0 };
            let loc = currentCurrency === 'MXN' ? 'en-US' : 'es-AR';
            let displayPrice = finalPrice.toLocaleString(loc, formatOpts);
            
            let tag = '';

            if (promoApplied && (index === 3 || index === 4)) {
                finalPrice = currentCurrency === 'MXN' ? (basePrice * 0.75) : Math.floor(basePrice * 0.75);
                displayPrice = `<span class="price-old">$${basePrice.toLocaleString(loc, formatOpts)}</span> $${finalPrice.toLocaleString(loc, formatOpts)}`;
                tag = '<span class="promo-tag">25% OFF</span>';
            }

            let highlightStyle = index === 2 ? 'border-color: rgba(217, 70, 239, 0.3);' : '';
            let popularBadge = index === 2 ? '<span class="promo-tag" style="background:#fff; color:#000;">POPULAR</span>' : tag;

            return `
            <div class="pkg-item" style="${highlightStyle}" onclick="selectPkg('${name}', '${finalPrice}', '', this, ${index})">
                ${popularBadge}
                <div style="display: flex; align-items: center; gap: 14px;">
                    ${img}
                    <span class="pkg-name">${name}</span>
                </div>
                <span class="pkg-price">$${displayPrice}</span>
            </div>`;
        }).join('');
    }

    function selectPkg(name, price, link, element, index) {
        document.querySelectorAll('.pkg-item').forEach(x => x.classList.remove('selected'));
        element.classList.add('selected'); 
        selPack = { n: name, p: price, m: link, idx: index };
    }

    function aplicarCupon() {
        const val = document.getElementById('promoInput').value.trim().toUpperCase();
        if (val === "SOCIAL20" || val === "NEXUS20") {
            promoApplied = true;
            showAlert("✅ ¡Cupón de acceso aplicado! Descuento desbloqueado.");
            renderPacks();
        } else {
            showAlert("✕ Código de acceso inválido.");
        }
    }

    function showAlert(msg) {
      const alertBox = document.getElementById('customAlert');
      alertBox.innerText = msg; alertBox.classList.add('show');
      setTimeout(() => alertBox.classList.remove('show'), 4000);
    }

    document.getElementById('username').addEventListener('input', function() {
        clearTimeout(typingTimer);
        resetUserStatus();
        if (this.value.trim().length > 2) {
            typingTimer = setTimeout(validarUsuarioAPI, 1000);
        }
    });

    function resetUserStatus() {
        if(currentPlat === 'ig') isUserOk = false;
        document.getElementById('userBox').classList.remove('valid-user', 'invalid-user');
        document.getElementById('userStatus').style.display = 'none';
        document.getElementById('miniSpinner').style.display = 'none';
    }

    async function validarUsuarioAPI() {
        let u = document.getElementById('username').value.trim().replace('@', '');
        let status = document.getElementById('userStatus');
        let box = document.getElementById('userBox');
        let spinner = document.getElementById('miniSpinner');
        if (!u || currentPlat !== 'ig') { isUserOk = true; return; }
        spinner.style.display = 'block';
        try {
            const response = await fetch(`https://simple-instagram-api.p.rapidapi.com/account-info?username=${u}`, {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': 'e560af1144msh8c0792183d0fbabp1fedf6jsn6ae53137f0cf',
                    'x-rapidapi-host': 'simple-instagram-api.p.rapidapi.com'
                }
            });
            const resData = await response.json();
            spinner.style.display = 'none';
            status.style.display = 'block';
            if (resData && resData.is_private !== undefined) {
                if (resData.is_private) {
                    status.innerHTML = "✕ | Perfil PRIVADO. Cambialo a público.";
                    status.style.color = "var(--error)"; box.classList.add('invalid-user');
                    isUserOk = false;
                } else {
                    status.innerHTML = "✓ Perfil sincronizado correctamente.";
                    status.style.color = "var(--nexus-accent)"; box.classList.add('valid-user');
                    isUserOk = true;
                }
            } else {
                status.innerHTML = "✕ | Usuario no encontrado en el sistema.";
                status.style.color = "var(--error)"; box.classList.add('invalid-user');
                isUserOk = false;
            }
        } catch (e) { spinner.style.display = 'none'; isUserOk = true; }
    }

    function verificarYPasar() {
        let u = document.getElementById('username').value.trim();
        if (!u || !selPack.n) return showAlert("⚠️ Ingresá tu usuario y seleccioná un servicio.");
        if (currentPlat === 'ig' && !isUserOk) return showAlert("✕ El perfil debe ser público para iniciar la gestión.");

        document.getElementById('loading').style.display = 'flex';
        document.getElementById('lText').innerText = "ENCRIPTANDO DATOS...";
        
        let formatOpts = currentCurrency === 'MXN' ? { minimumFractionDigits: 2, maximumFractionDigits: 2 } : { minimumFractionDigits: 0 };
        let loc = currentCurrency === 'MXN' ? 'en-US' : 'es-AR';
        
        // --- SISTEMA DE GUARDADO CORREGIDO PARA COMPATIBILIDAD CON PAGO.HTML ---
        const order = {
            game: currentPlat === 'ig' ? 'Instagram' : 'TikTok',
            id: u.startsWith('@') ? u : '@' + u,
            pack: selPack.n,
            price: currentCurrency + ' $' + Number(selPack.p).toLocaleString(loc, formatOpts),
            mpLink: selPack.m || '', 
            date: new Date().toLocaleDateString(),
            status: 'Pendiente',
            orderId: '#' + Math.floor(Math.random() * 900000 + 100000)
        };

        // Guardar el checkout actual (exactamente como lo lee pago.html)
        localStorage.setItem('current_checkout', JSON.stringify(order));
        
        // Guardar en el historial de pedidos de Nexus
        let history = JSON.parse(localStorage.getItem('nexus_orders')) || [];
        history.unshift(order);
        localStorage.setItem('nexus_orders', JSON.stringify(history));
        // -------------------------------------------------------------------------

        // Redirigir directamente a pago.html
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            window.location.href = 'pago.html';
        }, 1200);
    }

    function enviarPruebaTg() {
        let u = document.getElementById('username').value.trim();
        if(!u) return showAlert("⚠️ Ingresá tu usuario oficial arriba para pedir la prueba.");
        
        document.getElementById('loading').style.display = 'flex';
        document.getElementById('lText').innerText = "ENVIANDO SOLICITUD...";
        
        const textPrueba = `🎁 PRUEBA GRATUITA SOLICITADA (NEXUS)

📱 Plataforma: ${currentPlat.toUpperCase()}
👤 Usuario: ${u}`;
        
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(textPrueba)}`)
        .then(() => {
            document.getElementById('loading').style.display = 'none';
            showAlert("✅ Gestión iniciada. Los seguidores llegarán pronto.");
        })
        .catch(() => {
            document.getElementById('loading').style.display = 'none';
            showAlert("✅ Gestión iniciada. Los seguidores llegarán pronto.");
        });
    }

    renderPacks();
  </script>
</body>
</html>
