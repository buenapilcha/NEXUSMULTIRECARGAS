<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus | Iniciar Sesión</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
        :root {
            --bg: #000000;
            --accent: #FFFFFF;
            --text-secondary: #8E8E93;
        }

        /* --- RESET Y UX NATIVA --- */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            -webkit-user-select: none; 
            user-select: none;
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: var(--bg);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            overflow: hidden;
        }

        .gradient-blur {
            position: absolute;
            top: -20%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 340px;
            text-align: center;
            z-index: 10;
        }

        .logo-area {
            margin-bottom: 60px;
            animation: fadeIn 1s ease-out;
        }

        .logo-area h1 {
            font-size: 58px;
            font-weight: 900;
            letter-spacing: -4px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .logo-area p {
            color: var(--text-secondary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 500;
        }

        .auth-box {
            background: rgba(28, 28, 30, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 25px;
            border-radius: 28px;
            backdrop-filter: blur(20px);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* --- BOTONES ESTILO PREMIUM --- */
        .btn-google {
            background: var(--accent);
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .btn-google:active {
            transform: scale(0.96);
            background-color: rgba(255, 255, 255, 0.9);
        }

        .btn-google img {
            width: 20px;
            height: 20px;
        }

        .btn-guest {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .btn-guest:active {
            transform: scale(0.96);
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .legal-footer {
            margin-top: 20px;
            font-size: 11px;
            color: #3a3a3c;
            line-height: 1.5;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="gradient-blur"></div>

    <div class="login-container">
        <div class="logo-area">
            <h1>NEXUS</h1>
            <p>MULTIRECARGAS</p>
        </div>

        <div class="auth-box">
            <button class="btn-google" id="btn-login">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Continuar con Google
            </button>
            
            <button class="btn-guest" id="btn-guest">
                Continuar sin cuenta
            </button>
            
            <p class="legal-footer">
                Al continuar, aceptas los términos de servicio de Nexus para la compra de suscripciones digitales.
            </p>
        </div>
    </div>

    <script type="module">
        import { signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { auth, provider } from './firebase-config.js';

        // Observador del estado de autenticación
        onAuthStateChanged(auth, (user) => {
            if (user) {
                localStorage.removeItem('modo_invitado');
                window.location.href = "index.html";
            }
        });

        // Evento para el botón de Google
        document.getElementById('btn-login').addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Error de Autenticación:", error);
                alert("Hubo un error al iniciar sesión: " + error.message);
            }
        });

        // Evento para el botón de Invitado
        document.getElementById('btn-guest').addEventListener('click', () => {
            localStorage.setItem('modo_invitado', 'true');
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
